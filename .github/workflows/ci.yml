name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.dev.lock.txt
          python -m pip install -e .

      - name: Pre-commit (quick hooks)
        if: matrix.python-version == '3.12'
        run: SKIP=integrator-guardrails python -m pre_commit run --hook-stage pre-commit --all-files

      - name: Guardrails (strict)
        if: matrix.python-version == '3.12'
        run: |
          mkdir -p reports
          python guardrails.py --strict --skip-root-checks --json --scan-tracked --write-report reports/guardrails.json

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Typecheck (mypy)
        run: python -m mypy .

      - name: Skills sync gate
        run: python -m tools.check_skills_sync --json

      - name: Tests (unittest)
        run: |
          python -m unittest discover -s tests -p "test*.py" 2>&1 | tee reports/unittest.log

      - name: Noise gate (unittest log)
        run: python -m tools.check_negative_tests_stderr --log-path reports/unittest.log --json

      - name: Session close consistency
        if: matrix.python-version == '3.12'
        run: python -m tools.check_session_close_consistency --reports-dir reports --json

      - name: Execution plan consistency
        if: matrix.python-version == '3.12'
        run: python -m tools.check_execution_plan_consistency --reports-dir reports --json

      - name: Coverage (>= 80%)
        run: |
          mkdir -p reports
          python -m coverage run -m unittest discover -s tests -p "test*.py"
          python -m coverage report -m --fail-under=80
          python -m coverage xml -o reports/coverage.xml

      - name: Coverage target check (second wave >= 80%)
        if: matrix.python-version == '3.12'
        run: |
          python -m coverage json -o reports/coverage.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("reports/coverage.json").read_text(encoding="utf-8"))
          files_raw = payload.get("files", {})
          files = {}
          for key, value in files_raw.items():
              if not isinstance(key, str):
                  continue
              files[key.replace("\\", "/")] = value
          targets = {
              "cli_cmd_localai.py": 80.0,
              "cli_cmd_obsidian.py": 80.0,
              "tslab_offline_csv.py": 80.0,
              "scripts/validate_tslab_finam_txt.py": 80.0,
          }
          failed = []
          for module, threshold in targets.items():
              node = files.get(module)
              percent = float(node.get("summary", {}).get("percent_covered", 0.0)) if isinstance(node, dict) else 0.0
              print(f"{module}: {percent:.2f}% (threshold {threshold:.2f}%)")
              if percent < threshold:
                  failed.append((module, percent, threshold))
          if failed:
              for module, percent, threshold in failed:
                  print(f"FAIL {module}: {percent:.2f}% < {threshold:.2f}%")
              raise SystemExit(1)
          print("Targeted coverage check passed")
          PY

      - name: Perf degradation check (baseline contract)
        if: matrix.python-version == '3.12'
        run: |
          python -m integrator perf baseline --roots . --max-depth 2 --report-max-depth 1 --repeat 1 --write-report reports/perf_baseline_current.json --json
          python -m integrator perf check --baseline reports/perf_baseline_reference.json --current reports/perf_baseline_current.json --max-degradation-pct 20 --json

      - name: P17 phase1 gate
        if: matrix.python-version == '3.12'
        run: python -m tools.check_p17_phase1_gate --reports-dir reports --docs-dir docs --json

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts-py${{ matrix.python-version }}
          path: |
            reports/coverage.xml
            reports/coverage.json
            reports/guardrails.json
            reports/perf_baseline_current.json

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare reports/
        run: mkdir -p reports

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        with:
          args: --log-opts=--all

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependency audit (pip-audit)
        shell: bash
        run: |
          set +e
          python -m pip install --upgrade pip
          python -m pip install pip-audit

          python -m pip_audit -r requirements.txt -f json -o reports/pip-audit-requirements.json
          code1=$?
          python -m pip_audit -r requirements.operator.txt -f json -o reports/pip-audit-operator.json
          code2=$?

          if [ $code1 -ne 0 ] || [ $code2 -ne 0 ]; then
            echo "pip-audit found vulnerabilities; reports are uploaded as artifacts"
          fi

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            results.sarif
            reports/pip-audit-requirements.json
            reports/pip-audit-operator.json

  gate:
    name: test
    runs-on: ubuntu-latest
    needs: [test-matrix, test-windows, build, security]
    steps:
      - name: Gate
        run: echo ok

  test-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.dev.lock.txt
          python -m pip install -e .

      - name: Guardrails (strict)
        run: |
          New-Item -ItemType Directory -Force -Path reports | Out-Null
          python guardrails.py --strict --skip-root-checks --json --scan-tracked --write-report reports/guardrails.json

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Typecheck (mypy)
        run: python -m mypy .

      - name: Skills sync gate
        run: python -m tools.check_skills_sync --json

      - name: Tests (unittest)
        run: |
          python -m unittest discover -s tests -p "test*.py" 2>&1 | Tee-Object -FilePath reports/unittest.log

      - name: Noise gate (unittest log)
        run: python -m tools.check_negative_tests_stderr --log-path reports/unittest.log --json

      - name: Session close consistency
        run: python -m tools.check_session_close_consistency --reports-dir reports --json

      - name: Execution plan consistency
        run: python -m tools.check_execution_plan_consistency --reports-dir reports --json

      - name: P17 phase1 gate
        run: python -m tools.check_p17_phase1_gate --reports-dir reports --docs-dir docs --json

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts-windows-py${{ matrix.python-version }}
          path: |
            reports/guardrails.json

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build dist (sdist + wheel)
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Install wheel into clean venv and smoke
        run: |
          mkdir -p reports
          python -m venv .venv_dist
          . .venv_dist/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import importlib.metadata as m; import subprocess; meta=m.version('integrator'); cli=subprocess.check_output(['integrator','--version'], text=True).strip(); assert meta==cli, (meta, cli)"
          python -c "import json, subprocess; subprocess.check_call(['integrator','chains','list','--json'], stdout=subprocess.DEVNULL); subprocess.check_call(['integrator','registry','list','--json'], stdout=subprocess.DEVNULL)"
          python -m tools.ci_contract_smoke --json --md-path reports/ci_contract_smoke.md

      - name: Upload build smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-smoke-artifacts
          path: |
            reports/ci_contract_smoke.md
